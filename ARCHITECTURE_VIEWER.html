<!DOCTYPE html>
<html lang="en" class="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>raspi_project v11 — Architecture Board</title>
<style>
  :root{
    --bg:#161618; --panel:#1f1f24; --panel2:#26262c; --line:#34343c;
    --ink:#e9ecef; --ink2:#aab0b8; --accent:#9775fa;
  }
  html.light{
    --bg:#ffffff; --panel:#ffffff; --panel2:#f1f3f5; --line:#dee2e6;
    --ink:#1d1d20; --ink2:#5a5f66; --accent:#7048e8;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:var(--bg);color:var(--ink);
    font-family:'Inter',system-ui,'Segoe UI',Roboto,sans-serif;overflow:hidden}
  /* clean sans inside diagrams (standard, legible) */
  .scene text{font-family:'Inter',system-ui,'Segoe UI',Roboto,Arial,sans-serif;}

  #app{display:flex;height:100%}

  /* ---------- Sidebar ---------- */
  #sidebar{width:268px;flex:0 0 268px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;transition:margin-left .2s ease}
  #sidebar.collapsed{margin-left:-268px}
  .brand{padding:16px 16px 12px;border-bottom:1px solid var(--line)}
  .brand h1{font-size:15px;margin:0 0 4px;letter-spacing:.2px}
  .brand .meta{font-size:11px;color:var(--ink2);line-height:1.5}
  .brand .tag{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;
    background:#3a1c2b;color:#f783ac;border:1px solid #f783ac;margin-top:6px}
  nav{overflow-y:auto;flex:1;padding:8px 8px 16px}
  .group{margin-bottom:6px}
  .group>.ghead{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;
    padding:8px 10px;border-radius:8px;font-size:12px;font-weight:600;color:var(--ink2);
    text-transform:uppercase;letter-spacing:.6px}
  .group>.ghead:hover{background:var(--panel2)}
  .group>.ghead .chev{transition:transform .15s ease;font-size:10px}
  .group.closed .glist{display:none}
  .group.closed .chev{transform:rotate(-90deg)}
  .glist{margin:2px 0 8px}
  .navitem{display:flex;align-items:center;gap:9px;padding:8px 10px 8px 14px;margin:2px 4px;
    border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink);border:1px solid transparent}
  .navitem:hover{background:var(--panel2)}
  .navitem.active{background:var(--panel2);border-color:var(--accent)}
  .navitem .dot{width:9px;height:9px;border-radius:3px;flex:0 0 9px}
  .navitem .bn{font-size:10px;color:var(--ink2);margin-left:auto}
  .legend{border-top:1px solid var(--line);padding:12px 14px;font-size:11px;color:var(--ink2)}
  .legend h3{margin:0 0 8px;font-size:10px;letter-spacing:.6px;text-transform:uppercase}
  .lrow{display:flex;align-items:center;gap:8px;margin:5px 0}
  .lsw{width:14px;height:11px;border-radius:3px;border:1.5px solid}

  /* ---------- Main ---------- */
  #main{flex:1;display:flex;flex-direction:column;min-width:0}
  #topbar{height:52px;flex:0 0 52px;display:flex;align-items:center;gap:10px;padding:0 14px;
    background:var(--panel);border-bottom:1px solid var(--line)}
  .iconbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    width:34px;height:34px;border-radius:8px;cursor:pointer;font-size:16px;line-height:1;
    display:flex;align-items:center;justify-content:center}
  .iconbtn:hover{border-color:var(--accent)}
  #boardTitle{font-size:14px;font-weight:600;margin-left:4px}
  #boardSub{font-size:12px;color:var(--ink2);margin-left:8px}
  .spacer{flex:1}
  .zoomwrap{display:flex;align-items:center;gap:6px}
  #zoomlbl{font-size:12px;color:var(--ink2);width:46px;text-align:center}

  #stage{flex:1;position:relative;overflow:hidden;background:
    radial-gradient(circle at 1px 1px, var(--line) 1px, transparent 0) 0 0/26px 26px,
    var(--bg)}
  .board{position:absolute;inset:0;display:none}
  .board.active{display:block}
  .viewport{position:absolute;inset:0;overflow:hidden}
  .scene{position:absolute;inset:0;width:100%;height:100%}
  .hint{position:absolute;left:50%;bottom:14px;transform:translateX(-50%);
    background:var(--panel);border:1px solid var(--line);color:var(--ink2);
    font-size:11px;padding:6px 12px;border-radius:20px;pointer-events:none;opacity:.9}

  /* ---------- Layout-edit controls ---------- */
  .txtbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);height:34px;
    padding:0 12px;border-radius:8px;cursor:pointer;font-size:12px}
  .txtbtn:hover{border-color:var(--accent)}
  .iconbtn.active,.txtbtn.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .vsep{width:1px;height:26px;background:var(--line);margin:0 4px}
  #editBanner{position:absolute;left:50%;top:12px;transform:translateX(-50%);z-index:5;
    background:var(--accent);color:#fff;font-size:12px;font-weight:600;padding:7px 16px;
    border-radius:20px;box-shadow:0 4px 14px rgba(0,0,0,.4);pointer-events:none}
  /* interaction modes */
  #stage.mode-pan .viewport{cursor:grab}
  #stage.mode-pan .viewport.grabbing{cursor:grabbing}
  #stage.mode-select .viewport{cursor:text}
  #stage.mode-edit .viewport{cursor:move}
  #stage.mode-edit .node{cursor:move}
  #stage.mode-edit{outline:2px dashed var(--accent);outline-offset:-2px}
  #stage.mode-pan .scene,#stage.mode-edit .scene{user-select:none;-webkit-user-select:none}
  #stage.mode-select .scene{user-select:text;-webkit-user-select:text}
  .node.dragging{opacity:.92}

  /* ---------- Thai glossary panel ---------- */
  #glossary{position:absolute;top:0;right:0;width:430px;max-width:92vw;height:100%;z-index:20;
    background:var(--panel);border-left:1px solid var(--line);display:flex;flex-direction:column;
    transform:translateX(100%);transition:transform .22s ease;box-shadow:-8px 0 24px rgba(0,0,0,.35)}
  #glossary.open{transform:translateX(0)}
  #glossary .ghd{padding:14px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  #glossary .ghd h2{font-size:15px;margin:0;flex:1}
  #glossary .gsub{font-size:11px;color:var(--ink2);padding:0 16px;margin:8px 0 0}
  .gclose{cursor:pointer;background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;width:32px;height:32px;font-size:14px}
  .gclose:hover{border-color:var(--accent)}
  #gsearch{margin:10px 16px;padding:9px 11px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:13px;font-family:inherit}
  #glist{overflow-y:auto;flex:1;padding:2px 16px 26px}
  .gitem{padding:11px 0;border-bottom:1px solid var(--line)}
  .gitem .gt{font-size:13.5px;font-weight:600;color:var(--accent)}
  .gitem .gcat{font-size:10px;color:var(--ink2);margin-left:7px;border:1px solid var(--line);
    border-radius:10px;padding:1px 7px;white-space:nowrap}
  .gitem .gd{font-size:13.5px;color:var(--ink);margin-top:4px;line-height:1.6}
  .ghidden{display:none}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="brand">
      <h1>raspi_project v11</h1>
      <div class="meta">Traffic-Sign Speed-Limit Announcer · Pi 5 · C++17<br/>
        HEAD <code>001ab58</code> · branch <code>fix-gil</code></div>
      <span class="tag">SHADOW MODE · audio = shadow path</span>
    </div>
    <nav id="nav"></nav>
    <div class="legend">
      <h3>Color key</h3>
      <div class="lrow"><span class="lsw" style="border-color:#4dabf7;background:#13263b"></span>Perception (Camera·YOLO·ROI·Voter·CLS)</div>
      <div class="lrow"><span class="lsw" style="border-color:#b197fc;background:#221a3a"></span>Decision (L1·L2·L3)</div>
      <div class="lrow"><span class="lsw" style="border-color:#69db7c;background:#0f2c1d"></span>Audio (L4·aplay·speaker)</div>
      <div class="lrow"><span class="lsw" style="border-color:#ffc078;background:#3a2912"></span>Legacy authority</div>
      <div class="lrow"><span class="lsw" style="border-color:#f783ac;background:#3a1c2b"></span>Shadow pipeline</div>
      <div class="lrow"><span class="lsw" style="border-color:#ffe066;background:#332f12"></span>Data object</div>
      <div class="lrow"><span class="lsw" style="border-color:#adb5bd;background:#26262b"></span>Infra / thread</div>
    </div>
  </aside>

  <div id="main">
    <div id="topbar">
      <button class="iconbtn" id="toggleSidebar" title="Toggle sidebar">☰</button>
      <span id="boardTitle"></span>
      <span id="boardSub"></span>
      <div class="spacer"></div>
      <div class="zoomwrap">
        <button class="iconbtn" id="zoomOut" title="Zoom out">−</button>
        <span id="zoomlbl">100%</span>
        <button class="iconbtn" id="zoomIn" title="Zoom in">+</button>
        <button class="iconbtn" id="fit" title="Fit to screen">⤢</button>
      </div>
      <span class="vsep"></span>
      <button class="txtbtn modebtn" id="panBtn" title="Pan mode — drag to move, wheel to zoom">✋ Pan</button>
      <button class="txtbtn modebtn" id="selectBtn" title="Select mode — drag to select &amp; copy text">📝 Select</button>
      <button class="txtbtn modebtn" id="editBtn" title="Edit mode — drag nodes to reposition">✏ Edit</button>
      <button class="txtbtn" id="resetBtn" title="Reset this board's layout to default">Reset</button>
      <button class="txtbtn" id="exportBtn" title="Export all layouts as JSON">Export</button>
      <button class="txtbtn" id="importBtn" title="Import layouts from JSON">Import</button>
      <input type="file" id="importInput" accept="application/json,.json" style="display:none" />
      <button class="txtbtn" id="glossaryBtn" title="อภิธานศัพท์ภาษาไทย — Thai glossary">📖 ศัพท์</button>
      <span class="vsep"></span>
      <button class="iconbtn" id="theme" title="Toggle dark / light">◐</button>
    </div>
    <div id="stage"></div>
  </div>
</div>

<script>
/* ============================================================
   Excalidraw-style scene builder (SVG strings)
   ============================================================ */
const CAT = {
  // saturated fill + strong stroke/title — vivid yet readable on white
  perc:  {s:'#1565a8', f:'#cfe3f7'},   // perception — blue
  data:  {s:'#9a6f00', f:'#fceeb0'},   // data — amber
  dec:   {s:'#5b34c9', f:'#ddd2f7'},   // decision — purple
  audio: {s:'#268a3a', f:'#cdebd6'},   // audio — green
  legacy:{s:'#d24e08', f:'#fad8bf'},   // legacy — orange
  shadow:{s:'#b01e51', f:'#facfe0'},   // Brain 2 / momentary — magenta
  infra: {s:'#495057', f:'#dfe3e8'},   // infra — gray
  note:  {s:'#727a82', f:'#eceff2'},   // note — muted
  // live-sim state colors (Board 10): gray=idle yellow=processing green=ok red=rejected blue=waiting
  s_idle:{s:'#566377', f:'#dde3ea'},
  s_proc:{s:'#a06f04', f:'#fbeec0'},
  s_ok:  {s:'#268a3a', f:'#cdebd6'},
  s_rej: {s:'#c92a2a', f:'#fad2d2'},
  s_wait:{s:'#1565a8', f:'#cfe3f7'},
  active:{s:'#d97e00', f:'#ffe9c2'},
};
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// geometry scale — boxes & gaps grow while fonts stay fixed → more padding + spacing
const S = 1.18;
const sc = v => v*S;

function sidePoint(n, side){                 // returns SCALED absolute anchor
  const x=sc(n.x), y=sc(n.y), w=sc(n.w), h=sc(n.h);
  const cx=x+w/2, cy=y+h/2;
  switch(side){
    case 'left':  return {x:x,   y:cy};
    case 'right': return {x:x+w, y:cy};
    case 'top':   return {x:cx,  y:y};
    case 'bottom':return {x:cx,  y:y+h};
    default:      return {x:cx,  y:cy};
  }
}
function inferSides(a,b){
  const acx=a.x+a.w/2, acy=a.y+a.h/2, bcx=b.x+b.w/2, bcy=b.y+b.h/2;
  const dx=bcx-acx, dy=bcy-acy;
  if(Math.abs(dx) >= Math.abs(dy))
    return dx>=0 ? ['right','left'] : ['left','right'];
  return dy>=0 ? ['bottom','top'] : ['top','bottom'];
}
function labelPill(x,y,text,color){
  const w = text.length*6.8 + 16, h=21;
  return `<g><rect x="${x-w/2}" y="${y-h/2}" width="${w}" height="${h}" rx="10"
      style="fill:var(--panel)" stroke="${color}" stroke-width="1" opacity="0.97"/>
      <text x="${x}" y="${y+4.5}" text-anchor="middle" font-size="12.5" fill="${color}"
      style="font-family:Inter,sans-serif">${esc(text)}</text></g>`;
}
// draws node at LOCAL scaled coords (origin 0,0) — wrapped in a translated group
function nodeInner(n,pfx){
  const c = CAT[n.cls] || CAT.infra;
  const w=sc(n.w), h=sc(n.h);
  const lines = n.lines || [];
  let s = '';
  if(n.shape==='diamond'){
    const pts=`${w/2},0 ${w},${h/2} ${w/2},${h} 0,${h/2}`;
    s+=`<polygon points="${pts}" fill="${c.f}" stroke="${c.s}" stroke-width="2.5" filter="url(#rough_${pfx})"/>`;
  } else if(n.shape==='ellipse'){
    s+=`<ellipse cx="${w/2}" cy="${h/2}" rx="${w/2}" ry="${h/2}"
        fill="${c.f}" stroke="${c.s}" stroke-width="2.5" filter="url(#rough_${pfx})"/>`;
  } else if(n.shape==='life'){
    s+=`<rect x="0" y="0" width="${w}" height="46" rx="9"
        fill="${c.f}" stroke="${c.s}" stroke-width="2.5" filter="url(#rough_${pfx})"/>`;
    s+=`<line x1="${w/2}" y1="46" x2="${w/2}" y2="${h}"
        stroke="${c.s}" stroke-width="1.6" stroke-dasharray="3 6" opacity="0.7"/>`;
    s+=`<text x="${w/2}" y="29" text-anchor="middle" font-size="15" font-weight="bold" fill="${c.s}">${esc(n.title)}</text>`;
    return s;
  } else {
    s+=`<rect x="0" y="0" width="${w}" height="${h}" rx="13"
        fill="${c.f}" stroke="${c.s}" stroke-width="2.5" filter="url(#rough_${pfx})"/>`;
  }
  const TS=15.5, BS=13.5, LH=19, GAP=10;
  if(lines.length){
    const blockH = TS + GAP + lines.length*LH;       // vertically centre the text block
    const top = Math.max(8, (h - blockH)/2);
    const ty  = top + TS;
    s+=`<text x="${w/2}" y="${ty}" text-anchor="middle" font-size="${TS}" font-weight="bold" fill="${c.s}">${esc(n.title)}</text>`;
    lines.forEach((ln,i)=>{
      s+=`<text x="${w/2}" y="${ty + GAP + LH*(i+1) - 3}" text-anchor="middle" font-size="${BS}" fill="#343a40">${esc(ln)}</text>`;
    });
  } else {
    s+=`<text x="${w/2}" y="${h/2 + TS/2 - 1}" text-anchor="middle" font-size="${TS}" font-weight="bold" fill="${c.s}">${esc(n.title)}</text>`;
  }
  if(n.active){ s+=`<rect x="-3" y="-3" width="${w+6}" height="${h+6}" rx="15" fill="none" stroke="#fde047" stroke-width="3"><animate attributeName="opacity" values="1;0.4;1" dur="1s" repeatCount="indefinite"/></rect>`; }
  return s;
}
function nodeGroup(id,n,pfx){
  return `<g class="node" data-id="${id}" transform="translate(${sc(n.x)},${sc(n.y)})">${nodeInner(n,pfx)}</g>`;
}
function edge(map, e, pfx){
  // raw straight edge (sequence messages — Runtime board only) — coords are model space
  if(e.raw){
    const x1=sc(e.raw.x1), y1=sc(e.raw.y1), x2=sc(e.raw.x2), y2=sc(e.raw.y2);
    const col = e.cls?CAT[e.cls].s:'#8b9097';
    const dirx = x2>=x1?1:-1, ah=13;            // bold, colour-matched data-flow arrowhead
    const head = `${x2},${y2} ${x2-dirx*ah},${y2-ah*0.62} ${x2-dirx*ah},${y2+ah*0.62}`;
    let s=`<line x1="${x1}" y1="${y1}" x2="${x2-dirx*ah*0.7}" y2="${y2}" stroke="${col}" stroke-width="2.8"
        ${e.dash?'stroke-dasharray="6 6"':''}/>`;
    s+=`<polygon points="${head}" fill="${col}"/>`;
    if(e.label) s+=labelPill((x1+x2)/2,(y1+y2)/2-15,e.label,col);
    return s;
  }
  const a=map[e.from], b=map[e.to];
  const col = e.cls?CAT[e.cls].s:'#8b9097';
  // self loop (anchors already scaled)
  if(e.from===e.to){
    const A=sidePoint(a,'top'); const x=A.x, y=A.y;
    const d=`M${x-26},${y} C ${x-86},${y-96} ${x+86},${y-96} ${x+26},${y}`;
    let s=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.4" marker-end="${markerId(col,pfx)}"/>`;
    if(e.label) s+=labelPill(x,y-82,e.label,col);
    return s;
  }
  let fs,ts;
  if(e.fromSide&&e.toSide){fs=e.fromSide;ts=e.toSide;} else {[fs,ts]=inferSides(a,b);}
  const p1=sidePoint(a,fs), p2=sidePoint(b,ts);
  let d, lx, ly;
  if(fs==='right'||fs==='left'){
    const mx=(p1.x+p2.x)/2;
    d=`M${p1.x},${p1.y} L${mx},${p1.y} L${mx},${p2.y} L${p2.x},${p2.y}`;
    lx=mx; ly=p1.y-16;                       // lift label above the horizontal run
  } else {
    const my=(p1.y+p2.y)/2;
    d=`M${p1.x},${p1.y} L${p1.x},${my} L${p2.x},${my} L${p2.x},${p2.y}`;
    lx=p1.x+18; ly=my;                        // shift label beside the vertical run
  }
  let s=`<path d="${d}" fill="none" stroke="${col}" stroke-width="2.4"
      ${e.dash?'stroke-dasharray="7 6"':''} marker-end="${markerId(col,pfx)}" opacity="0.95"/>`;
  if(e.label) s+=labelPill(lx,ly,e.label,col);
  return s;
}
function region(r){
  const c=CAT[r.cls]||CAT.infra;
  const x=sc(r.x), y=sc(r.y), w=sc(r.w), h=sc(r.h);
  return `<g><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="16"
      fill="${c.s}" opacity="0.06"/>
    <rect x="${x}" y="${y}" width="${w}" height="${h}" rx="16"
      fill="none" stroke="${c.s}" stroke-width="2" stroke-dasharray="9 7" opacity="0.65"/>
    <text x="${x+18}" y="${y+28}" font-size="14.5" font-weight="bold" fill="${c.s}"
      style="font-family:Inter,sans-serif">${esc(r.label)}</text></g>`;
}
function note(nt){
  if(nt.divider){
    const x=sc(nt.x), y=sc(nt.y), w=sc(nt.w);
    return `<g><line x1="${x}" y1="${y}" x2="${x+w}" y2="${y}"
        stroke="#6b7077" stroke-width="1.5" stroke-dasharray="4 7"/>
      <rect x="${x+w/2-nt.label.length*3.8-12}" y="${y-12}" width="${nt.label.length*7.6+24}" height="24" rx="12"
        style="fill:var(--panel)" stroke="#6b7077"/>
      <text x="${x+w/2}" y="${y+5}" text-anchor="middle" font-size="12.5" fill="#5a6068"
        style="font-family:Inter,sans-serif">${esc(nt.label)}</text></g>`;
  }
  const c=CAT[nt.cls||'note'];
  const x=sc(nt.x), y=sc(nt.y), w=sc(nt.w);
  const lines = nt.lines||[];
  const h = (nt.h ? sc(nt.h) : (lines.length*19 + (nt.title?30:16)));
  let s=`<g><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="11"
      fill="${c.f}" stroke="${c.s}" stroke-width="1.6" opacity="0.97"/>`;
  let yy=y+22;
  if(nt.title){ s+=`<text x="${x+14}" y="${yy}" font-size="14" font-weight="bold" fill="${c.s}">${esc(nt.title)}</text>`; yy+=24; }
  lines.forEach(ln=>{ s+=`<text x="${x+14}" y="${yy}" font-size="13" fill="#343a40">${esc(ln)}</text>`; yy+=19; });
  return s+`</g>`;
}
// one arrowhead marker per edge colour, namespaced per board (ids must be unique across svgs)
const markerId = (col,pfx) => 'url(#ar_'+pfx+'_'+col.replace('#','')+')';
function defs(pfx){
  const cols = ['#8b9097'].concat(Object.values(CAT).map(c=>c.s));
  const markers = cols.map(col=>
    `<marker id="ar_${pfx}_${col.replace('#','')}" viewBox="0 0 10 10" refX="8.4" refY="5" markerWidth="8.5" markerHeight="8.5" orient="auto">`+
    `<path d="M0,0 L10,5 L0,10 z" fill="${col}"/></marker>`).join('');
  return `<defs>
    <filter id="rough_${pfx}" x="-12%" y="-12%" width="124%" height="124%">
      <feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="11" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="0" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    ${markers}
  </defs>`;
}
function renderEdges(b){ return (b.edges||[]).map(e=>edge(b.nodes||{},e,b.id)).join(''); }
function renderNodes(b){ return Object.entries(b.nodes||{}).map(([id,n])=>nodeGroup(id,n,b.id)).join(''); }
function buildSVG(b){
  const W=sc(b.W), H=sc(b.H);
  return `<svg class="scene" data-w="${W}" data-h="${H}" width="${W}" height="${H}"
     viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${defs(b.id)}
    <g class="g-regions">${(b.regions||[]).map(region).join('')}</g>
    <g class="g-edges">${renderEdges(b)}</g>
    <g class="g-nodes">${renderNodes(b)}</g>

BOARDS.forEach(b=>{
  const wrap=document.createElement('div'); wrap.className='board'; wrap.id='board-'+b.id;
  const vp=document.createElement('div'); vp.className='viewport';
  vp.innerHTML=buildSVG(b);
  wrap.appendChild(vp);
  stage.appendChild(wrap);
  const svg=vp.querySelector('.scene');
  DOMB[b.id]={vp, svg, gNodes:svg.querySelector('.g-nodes'), gEdges:svg.querySelector('.g-edges')};
  PZ[b.id]=new PanZoom(vp, svg, b);
  attachDrag(b, DOMB[b.id]);
});

function refreshBoard(b){
  const d=DOMB[b.id];
  d.gNodes.innerHTML=renderNodes(b);
  d.gEdges.innerHTML=renderEdges(b);
}

// ---- node dragging (active only in Edit Layout mode) ----
function attachDrag(board, dom){
  const svg=dom.svg;
  let dr=null;
  svg.addEventListener('pointerdown', function(e){
    if(mode!=='edit') return;
    const g = e.target.closest && e.target.closest('.node');
    if(!g) return;                          // empty space → viewport pans instead
    const id=g.dataset.id, n=board.nodes[id];
    if(!n) return;
    e.stopPropagation(); e.preventDefault();
    dr={g,id,sx:e.clientX,sy:e.clientY,ox:n.x,oy:n.y};
    g.classList.add('dragging');
    try{ svg.setPointerCapture(e.pointerId); }catch(_){}
  });
  svg.addEventListener('pointermove', function(e){
    if(!dr) return;
    const k=PZ[board.id].k;
    const n=board.nodes[dr.id];
    n.x = dr.ox + (e.clientX-dr.sx)/k/S;     // screen px → scene → model units
    n.y = dr.oy + (e.clientY-dr.sy)/k/S;
    dr.g.setAttribute('transform',`translate(${sc(n.x)},${sc(n.y)})`);
    dom.gEdges.innerHTML=renderEdges(board);  // live edge re-routing (labels stay attached)
  });
  const stop=function(e){
    if(!dr) return;
    dr.g.classList.remove('dragging');
    try{ svg.releasePointerCapture(e.pointerId); }catch(_){}
    dr=null;
  };
  svg.addEventListener('pointerup', stop);
  svg.addEventListener('pointercancel', stop);
}

// viewBox-based pan/zoom — vector-crisp at any level (no CSS transform raster blur)
function PanZoom(vp, scene, board){
  this.vp=vp; this.scene=scene; this.board=board;
  const self=this;
  const SW=sc(board.W), SH=sc(board.H);   // native scene size
  this.x=0; this.y=0; this.w=SW;          // viewBox top-left + width (height derived from aspect)
  this.k=1; this.fitted=false;
  this.clampW=function(w){ const vw=vp.clientWidth||1; return Math.min(Math.max(w, vw/6), Math.max(SW,SH)*4); };
  this.apply=function(){
    const vw=vp.clientWidth||1, vh=vp.clientHeight||1;
    const h=this.w*vh/vw;                 // keep viewBox aspect == element aspect (no letterbox)
    scene.setAttribute('viewBox', this.x+' '+this.y+' '+this.w+' '+h);
    this.k=vw/this.w;                     // px per scene-unit (zoom)
    if(activeId===board.id) zoomlbl.textContent=Math.round(this.k*100)+'%';
  };
  this.home=function(){                   // default view = 100% (1 scene unit = 1 px)
    const vw=vp.clientWidth||1, vh=vp.clientHeight||1;
    this.w=this.clampW(vw);
    const h=this.w*vh/vw;
    this.x = SW<=this.w ? (SW-this.w)/2 : -30;   // small boards centre; big boards start top-left
    this.y = SH<=h ? (SH-h)/2 : -30;
    this.fitted=true; this.apply();
  };
  this.fit=function(){                    // whole-board overview
    const vw=vp.clientWidth||1, vh=vp.clientHeight||1;
    this.w=this.clampW(Math.max(SW, SH*vw/vh)/0.94);
    const h=this.w*vh/vw;
    this.x=(SW-this.w)/2; this.y=(SH-h)/2; this.fitted=true; this.apply();
  };
  this.zoomAt=function(cx,cy,factor){
    const vw=vp.clientWidth||1;
    const z=vw/this.w, sx=this.x+cx/z, sy=this.y+cy/z;   // scene point under cursor
    this.w=this.clampW(this.w/factor);
    const nz=vw/this.w;
    this.x=sx-cx/nz; this.y=sy-cy/nz; this.apply();
  };
  // wheel zoom (crisp)
  vp.addEventListener('wheel',function(e){
    e.preventDefault();
    const r=vp.getBoundingClientRect();
    self.zoomAt(e.clientX-r.left, e.clientY-r.top, e.deltaY<0?1.12:1/1.12);
  },{passive:false});
  // drag pan (a node grab in edit mode stops the event before it reaches here)
  let drag=false, lx=0, ly=0;
  vp.addEventListener('pointerdown',function(e){
    if(mode!=='pan') return;                 // pan only in Pan mode
    drag=true; lx=e.clientX; ly=e.clientY;
    vp.classList.add('grabbing'); try{ vp.setPointerCapture(e.pointerId); }catch(_){}
  });
  vp.addEventListener('pointermove',function(e){ if(!drag)return;
    const z=self.k;
    self.x-=(e.clientX-lx)/z; self.y-=(e.clientY-ly)/z; lx=e.clientX; ly=e.clientY; self.apply(); });
  const end=function(){ drag=false; vp.classList.remove('grabbing'); };
  vp.addEventListener('pointerup',end); vp.addEventListener('pointercancel',end);
}

const boardTitle=document.getElementById('boardTitle');
const boardSub=document.getElementById('boardSub');
const zoomlbl=document.getElementById('zoomlbl');

function showBoard(id){
  activeId=id;
  document.querySelectorAll('.board').forEach(el=>el.classList.toggle('active', el.id==='board-'+id));
  document.querySelectorAll('.navitem').forEach(el=>el.classList.toggle('active', el.dataset.board===id));
  const b=BOARDS.find(x=>x.id===id);
  boardTitle.textContent=b.title; boardSub.textContent=b.sub;
  if(window.__simOnShow) window.__simOnShow(id);
  requestAnimationFrame(()=>{ const pz=PZ[id]; if(!pz.fitted){ if(b.fitDefault) pz.fit(); else pz.home(); } else pz.apply(); });
}

// ---- Reset / Export / Import layout ----
document.getElementById('resetBtn').onclick=()=>{
  const b=BOARDS.find(x=>x.id===activeId); if(!b) return;
  Object.entries(ORIG[b.id]).forEach(([id,p])=>{ if(b.nodes[id]){ b.nodes[id].x=p.x; b.nodes[id].y=p.y; } });
  refreshBoard(b);
};
document.getElementById('exportBtn').onclick=()=>{
  const out={};
  BOARDS.forEach(b=>{ out[b.id]={}; Object.entries(b.nodes||{}).forEach(([id,n])=>{ out[b.id][id]={x:Math.round(n.x),y:Math.round(n.y)}; }); });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='architecture_layout.json'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),1000);
};
const importInput=document.getElementById('importInput');
document.getElementById('importBtn').onclick=()=> importInput.click();
importInput.onchange=function(){
  const f=importInput.files && importInput.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=function(){
    try{
      const data=JSON.parse(rd.result);
      BOARDS.forEach(b=>{ const bd=data[b.id]; if(!bd) return;
        Object.entries(bd).forEach(([id,p])=>{
          if(b.nodes[id] && typeof p.x==='number' && typeof p.y==='number'){ b.nodes[id].x=p.x; b.nodes[id].y=p.y; }
        });
        refreshBoard(b);
      });
    }catch(err){ alert('Invalid layout JSON: '+err.message); }
    importInput.value='';
  };
  rd.readAsText(f);
};

   BOARD 10 — LIVE SIMULATION ENGINE  (faithful L1–L4 semantics)
   ============================================================ */
(function(){
  const B10 = BOARDS.find(x=>x.id==='b10');
  const SIM_SIGNS=['sign_50','sign_60','sign_80','sign_90','sign_100'];
  const SIM_STCLS={idle:'s_idle',processing:'s_proc',success:'s_ok',rejected:'s_rej',waiting:'s_wait'};
  const SIM_DOT  ={idle:'#94a3b8',processing:'#eab308',success:'#22c55e',rejected:'#ef4444',waiting:'#3b82f6'};
  const MODS=['camera','cameraThread','doubleBuffer','asyncWorker','yolo','voter','roi','cls','legacy','l1','l2','l3','l4','speaker'];
  const BASE_EDGES = B10.edges.map(e=>({...e}));

  const simRnd=(a,b)=>+(a+Math.random()*(b-a)).toFixed(2);
  const simJit=(b,s)=>+(b+(Math.random()*2-1)*s).toFixed(1);
  const simBox=()=>[120+Math.round(Math.random()*60),80+Math.round(Math.random()*40),
                    64+Math.round(Math.random()*36),64+Math.round(Math.random()*36)];
  const simNum=s=> s? s.replace('sign_',''):null;

  function simFresh(cfg){
    return {now:0,frameId:0,tickCount:0,config:cfg,tmp:{},colors:{},activeBlock:null,lastTick:null,log:[],
      camera:{fps:0,latestFrameId:0,captureTs:0},
      doubleBuffer:{writeSlot:0,readSlot:1,latestAvailable:false,producerActive:false,consumerActive:false},
      worker:{busy:false,latestWins:true,processingFrame:0,dropped:0},
      yolo:{conf:0,box:null,cls:'—',inferMs:0},
      voter:{candidate:'—',votes:0,required:cfg.requiredVotes,confirmed:false,window:[]},
      cls:{roiSize:'—',result:'—',conf:0,inferMs:0},
      l1:{state:'ARMED',lastSeen:0,rearmActive:false,fresh:false},
      l2:{state:'UNKNOWN',current:null,pending:null,pendingCount:0}, l2meta:{lastConfirmedAt:0},
      l3:{lastAction:'—',lastAnnounceAt:null},
      l4:{threadActive:false,playing:'—',pendingSlot:'—',queueState:'latest-wins (1 slot)'}};
  }
  function simL2(s,value){
    const K=s.config.K;
    if(s.l2.state==='UNKNOWN'){ s.l2.current=value; s.l2.state='ACTIVE'; s.l2.pending=null; s.l2.pendingCount=0;
      s.l2meta.lastConfirmedAt=s.now; return {changed:true,event:'Acquire'}; }
    if(value===s.l2.current){ s.l2meta.lastConfirmedAt=s.now; s.l2.pending=null; s.l2.pendingCount=0;
      return {changed:false,event:'Reconfirm'}; }
    if(s.l2.pending===value) s.l2.pendingCount++; else {s.l2.pending=value; s.l2.pendingCount=1;}
    if(s.l2.pendingCount>=K){ s.l2.current=value; s.l2meta.lastConfirmedAt=s.now; s.l2.pending=null; s.l2.pendingCount=0;
      return {changed:true,event:'Change(K='+K+')'}; }
    return {changed:false,event:'Pending '+s.l2.pendingCount+'/'+K};
  }
  function simL3(s,changed,fresh){
    const cd=s.config.reminderMs;
    if(changed){ s.l3.lastAction='CHANGE'; s.l3.lastAnnounceAt=s.now; return {action:'CHANGE',announce:true}; }
    if(fresh){ if(s.l3.lastAnnounceAt==null || (s.now-s.l3.lastAnnounceAt)>=cd){
        s.l3.lastAction='REMINDER'; s.l3.lastAnnounceAt=s.now; return {action:'REMINDER',announce:true}; }
      s.l3.lastAction='SUPPRESS-CD'; return {action:'SUPPRESS-CD',announce:false}; }
    s.l3.lastAction='SUPPRESS-CONT'; return {action:'SUPPRESS-CONT',announce:false};
  }

  function simBuildStages(frame){
    const lg=(s,c,t)=>{ s.tickCount++; s.lastTick={n:s.tickCount,label:t,color:c};
      s.log.push({n:s.tickCount,label:t,color:c}); if(s.log.length>240)s.log.shift(); };
    return [
     {block:'camera',run:s=>{ s.tmp={}; s.colors={}; s.activeBlock='camera';
        if(frame.advanceMs) s.now+=frame.advanceMs;
        s.frameId++; s.camera.latestFrameId=s.frameId; s.camera.captureTs=s.now;
        s.camera.fps=+(1000/s.config.intervalMs).toFixed(1);
        s.colors.camera='success'; s.tmp.input=frame.input; s.tmp.cls=frame.clsOverride;
        lg(s,'success',`CAMERA: capture frame #${s.frameId} @ t+${s.now}ms`+(frame.advanceMs?` (clock +${frame.advanceMs}ms)`:'')); }},
     {block:'doubleBuffer',run:s=>{ s.activeBlock='doubleBuffer'; const prev=s.doubleBuffer.writeSlot;
        s.doubleBuffer.writeSlot=1-prev; s.doubleBuffer.readSlot=prev; s.doubleBuffer.latestAvailable=true;
        s.doubleBuffer.producerActive=true; s.doubleBuffer.consumerActive=true;
        s.colors.cameraThread='success'; s.colors.doubleBuffer='success';
        lg(s,'success',`DOUBLE BUFFER: write→slot ${s.doubleBuffer.writeSlot}, read→slot ${s.doubleBuffer.readSlot} (consumer clones)`); }},
     {block:'asyncWorker',run:s=>{ s.activeBlock='asyncWorker'; s.worker.busy=true; s.worker.latestWins=true;
        s.worker.processingFrame=s.frameId; s.colors.asyncWorker='processing';
        lg(s,'processing',`ASYNC WORKER: submit frame #${s.frameId} (latest-wins, dropped=${s.worker.dropped})`); }},
     {block:'yolo',run:s=>{ s.activeBlock='yolo'; s.yolo.inferMs=simJit(93,8); const inp=s.tmp.input;
        if(inp){ s.yolo.conf=simRnd(.55,.95); s.yolo.box=simBox(); s.yolo.cls=inp; s.tmp.presence=true; s.colors.yolo='success';
          lg(s,'success',`YOLO: detected ${inp} conf=${s.yolo.conf} box=[${s.yolo.box}] (${s.yolo.inferMs}ms)`); }
        else { s.yolo.conf=0; s.yolo.box=null; s.yolo.cls='—'; s.tmp.presence=false; s.colors.yolo='idle';
          lg(s,'idle',`YOLO: no detection (NULL) (${s.yolo.inferMs}ms)`); }
        s.worker.busy=false; }},
     {block:'voter',run:s=>{ s.activeBlock='voter'; const w=s.voter.window.slice(); w.push(s.tmp.input||null);
        while(w.length>s.config.voteWindow) w.shift();
        const cnt={}; w.forEach(v=>{ if(v) cnt[v]=(cnt[v]||0)+1; });
        let cand=null,best=0; Object.keys(cnt).sort().forEach(k=>{ if(cnt[k]>best){best=cnt[k];cand=k;} });
        const confirmed=!!cand && best>=s.config.requiredVotes;
        s.voter={candidate:cand||'—',votes:best,required:s.config.requiredVotes,confirmed,window:w};
        s.tmp.confirmed=confirmed; s.tmp.candidate=cand;
        s.colors.voter=confirmed?'success':(best>0?'processing':'idle');
        lg(s,confirmed?'success':(best>0?'processing':'idle'),
          `VOTER: ${cand||'—'} ${best}/${s.config.requiredVotes} → ${confirmed?'CONFIRMED':'accumulating'}`); }},
     {block:'cls',run:s=>{ s.activeBlock='cls';
        if(s.tmp.confirmed){ const val=(s.tmp.cls!=null)?s.tmp.cls:s.tmp.candidate;
          s.cls={roiSize:'64×64',result:val,conf:simRnd(.70,.96),inferMs:simJit(8,2)};
          s.tmp.value=val; s.colors.roi='success'; s.colors.cls='success';
          lg(s,'success',`ROI+CLS: classify best crop → value=${val} conf=${s.cls.conf} (${s.cls.inferMs}ms)`); }
        else { s.colors.roi='idle'; s.colors.cls='idle'; lg(s,'idle',`CLS: skipped (no confirm) — Confirm-then-Classify`); } }},
     {block:'l1',run:s=>{ s.activeBlock='l1'; const presence=s.tmp.presence,confirmed=s.tmp.confirmed;
        const now=s.now,rearm=s.config.rearmMs;
        if(presence) s.l1.lastSeen=now;
        let fired=false,fresh=false; const st=s.l1.state;
        if(st==='ARMED'){ if(confirmed){ s.l1.state='CONFIRMED'; fired=true; fresh=true; } }
        else if(st==='CONFIRMED'){ if(confirmed){ fired=true; fresh=false; } else if(!presence){ s.l1.state='RELEASING'; } }
        else if(st==='RELEASING'){ if(confirmed){ s.l1.state='CONFIRMED'; fired=true; fresh=false; } else if(presence){ s.l1.state='CONFIRMED'; } }
        if(s.l1.state==='RELEASING' && (now-s.l1.lastSeen)>=rearm){ s.l1.state='ARMED'; }
        s.l1.fresh=fresh; s.l1.rearmActive=(s.l1.state==='RELEASING');
        s.tmp.fired=fired; s.tmp.fresh=fresh;
        s.colors.l1=fired?'success':(s.l1.state==='RELEASING'?'waiting':'idle');
        lg(s,fired?'success':'idle',`L1: state=${s.l1.state} ${fired?'FIRE{value='+s.tmp.value+', fresh='+fresh+'}':'(no fire)'}`); }},
     {block:'l2',run:s=>{ s.activeBlock='l2';
        if(s.tmp.fired){ const r=simL2(s,s.tmp.value); s.tmp.changed=r.changed;
          s.colors.l2=r.changed?'success':(r.event.indexOf('Pending')===0?'waiting':'processing');
          lg(s,r.changed?'success':'processing',`L2: ${r.event} → belief=${s.l2.current!=null?simNum(s.l2.current):'UNKNOWN'}`+(r.changed?'  [changed]':'')); }
        else { s.tmp.changed=false; s.colors.l2='idle';
          lg(s,'idle',`L2: idle (no fire) belief=${s.l2.current!=null?simNum(s.l2.current):'UNKNOWN'}`); } }},
     {block:'l3',run:s=>{ s.activeBlock='l3';
        if(s.tmp.fired){ const r=simL3(s,s.tmp.changed,s.tmp.fresh); s.tmp.action=r.action; s.tmp.announce=r.announce;
          const ok=r.action==='CHANGE'||r.action==='REMINDER'; s.colors.l3=ok?'success':'rejected';
          lg(s,ok?'success':'rejected',`L3: ${r.action}${ok?' 🔊 (reset cooldown)':' (silent)'}`); }
        else { s.tmp.announce=false; s.colors.l3='idle'; lg(s,'idle',`L3: idle`); } }},
     {block:'l4',run:s=>{ s.activeBlock='l4';
        if(s.tmp.announce){ const v=simNum(s.l2.current); const fn=`${s.tmp.action.toLowerCase()}_${v}.wav`;
          s.l4={threadActive:true,playing:fn,pendingSlot:fn,queueState:'latest-wins (1 slot)'};
          s.colors.l4='success'; s.colors.speaker='success';
          lg(s,'success',`L4: notify → slot="${fn}" → 🔊 SPEAKER plays "${fn}"`); }
        else { s.l4.threadActive=false; s.colors.l4='idle'; s.colors.speaker='idle'; lg(s,'idle',`L4: nothing to play (queue idle)`); }
        s.now+=s.config.intervalMs; }},
    ];
  }

  // ---- scenarios (Req 5) ----
  const det=(sg,n,cls)=>{const a=[];for(let i=0;i<(n||1);i++)a.push({input:sg,clsOverride:cls});return a;};
  const SIM_SCEN={
    A:{setK:1,frames:[...det('sign_80',3)]},
    B:{setK:1,frames:[{input:'sign_80'},{input:null},{input:'sign_80'},{input:null},{input:'sign_80'}]},
    C:{setK:1,frames:[...det('sign_50',2),...det('sign_60',3)]},
    D:{setK:1,frames:[...det('sign_50',3)]},
    E:{setK:1,frames:[...det('sign_80',2),{input:null,advanceMs:181000},...det('sign_80',2)]},
    F:{setK:2,frames:[...det('sign_50',2),{input:'sign_50',clsOverride:'sign_80'},
                      {input:'sign_50',clsOverride:'sign_50'},{input:'sign_50',clsOverride:'sign_50'}]},
  };

  // ---- runtime state ----
  let simState=simFresh({requiredVotes:2,voteWindow:10,K:1,rearmMs:600,reminderMs:180000,intervalMs:100,speed:550});
  let simQueue=[], simPend=[], simTimer=null, simDebug=false, simInit=false;

  function simLines(s,id){
    const tt=v=>v==null?'—':'t+'+v+'ms';
    switch(id){
      case'camera':return['Picamera2 read()','RGB888 → BGR','GIL bracketed'];
      case'cameraThread':return['fps: '+s.camera.fps,'frame #: '+s.camera.latestFrameId,'capture: '+tt(s.camera.captureTs)];
      case'doubleBuffer':return['write slot: '+s.doubleBuffer.writeSlot,'read slot: '+s.doubleBuffer.readSlot,'avail: '+s.doubleBuffer.latestAvailable,'producer: '+s.doubleBuffer.producerActive,'consumer: '+s.doubleBuffer.consumerActive];
      case'asyncWorker':return['busy: '+s.worker.busy,'latest-wins: '+s.worker.latestWins,'proc frame: '+s.worker.processingFrame,'dropped: '+s.worker.dropped];
      case'yolo':return['conf: '+s.yolo.conf,'box: '+(s.yolo.box?'['+s.yolo.box+']':'—'),'class: '+s.yolo.cls,'infer: '+s.yolo.inferMs+'ms'];
      case'voter':return['cand: '+s.voter.candidate,'votes: '+s.voter.votes+'/'+s.voter.required,'confirmed: '+s.voter.confirmed,'win:['+s.voter.window.map(x=>x?simNum(x):'·').join(',')+']'];
      case'roi':return['BestROI latch','highest-conf crop','→ CLS on confirm'];
      case'cls':return['roi: '+s.cls.roiSize,'result: '+s.cls.result,'conf: '+s.cls.conf,'infer: '+s.cls.inferMs+'ms'];
      case'legacy':return['REMOVED at cutover 06-17','was: voter + cooldown → [CONFIRMED]','L1–L4 is now the authority'];
      case'l1':return['state: '+s.l1.state,'last seen: '+tt(s.l1.lastSeen),'rearm: '+s.l1.rearmActive,'fresh: '+s.l1.fresh];
      case'l2':return['state: '+s.l2.state,'limit: '+(s.l2.current!=null?simNum(s.l2.current):'—'),'pending: '+(s.l2.pending!=null?simNum(s.l2.pending):'—')+' ('+s.l2.pendingCount+')','K: '+s.config.K,'age: '+(s.l2.state==='ACTIVE'?((s.now-s.l2meta.lastConfirmedAt)/1000).toFixed(1)+'s':'—')];
      case'l3':{const cd=s.l3.lastAnnounceAt==null?0:Math.max(0,(s.config.reminderMs-(s.now-s.l3.lastAnnounceAt))/1000);
        return['action: '+s.l3.lastAction,'cooldown: '+cd.toFixed(1)+'s left','last ann: '+tt(s.l3.lastAnnounceAt)];}
      case'l4':return['thread: '+s.l4.threadActive,'playing: '+s.l4.playing,'slot: '+s.l4.pendingSlot,'latest-wins'];
      case'speaker':return['MAX98357A I2S',(s.colors.speaker==='success'?'🔊 '+s.l4.playing:'idle')];
    }
    return[];
  }
  function simRender(){
    const s=simState;
    MODS.forEach(id=>{ const n=B10.nodes[id]; if(!n)return;
      n.lines=simLines(s,id); n.active=(s.activeBlock===id);
      n.cls = (id==='legacy') ? 'legacy' : SIM_STCLS[s.colors[id]||'idle']; });
    B10.edges = BASE_EDGES.map(e=>{ const c={...e}; if(e.to===s.activeBlock){c.cls='active';c.dash=false;} return c; });
    refreshBoard(B10);
    hudTickN.textContent='TICK '+(s.lastTick?s.lastTick.n:0);
    hudTickL.textContent=s.lastTick?s.lastTick.label:'idle — pick INPUT / SCENARIO or step Next Tick';
    hudTickL.style.color=s.lastTick?SIM_DOT[s.lastTick.color]:'#94a3b8';
    hudLog.innerHTML=s.log.slice(-50).reverse().map(l=>
      `<div style="color:${SIM_DOT[l.color]}"><span style="color:#64748b">#${String(l.n).padStart(3,'0')}</span> ${esc(l.label)}</div>`).join('');
  }
  function simStop(){ if(simTimer){clearTimeout(simTimer);simTimer=null;} hudRun.textContent='⏩ Auto Run'; }
  function simStep(){
    if(simPend.length===0){ if(simQueue.length===0) return false; simPend=simBuildStages(simQueue.shift()); }
    const st=simPend.shift(); st.run(simState); simRender(); return true;
  }
  function simAutorun(){ simStop(); hudRun.textContent='⏸ Pause';
    const tick=()=>{ const more=simStep(); if(more){ simTimer=setTimeout(tick,simState.config.speed); } else { simStop(); } };
    tick(); }
  function simReset(){ simStop(); simState=simFresh({...simState.config}); simState.voter.required=simState.config.requiredVotes;
    simQueue=[]; simPend=[]; simRender(); }
  function simEnqueue(input,cls){ simQueue.push({input,clsOverride:cls}); if(!simDebug){ if(!simTimer) simAutorun(); } else simRender(); }
  function simRunScenario(k){ const sc=SIM_SCEN[k]; if(!sc)return;
    if(sc.setK!=null){ simState.config.K=sc.setK; hudK.value=sc.setK; hudKV.textContent=sc.setK; }
    simReset(); simQueue=sc.frames.map(f=>({...f})); simPend=[];
    if(simDebug) simRender(); else simAutorun(); }

  /* ---------- HUD overlay ---------- */
  const css=document.createElement('style');
  css.textContent=`.simbtn{background:var(--panel2);border:1px solid var(--line);color:var(--ink);
    border-radius:7px;padding:4px 9px;font-size:11px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif}
    .simbtn:hover{border-color:var(--accent)} .simbtn.on{background:var(--accent);border-color:var(--accent);color:#fff}
    #simHUD input[type=range]{vertical-align:middle} #simHUD label{white-space:nowrap}`;
  document.head.appendChild(css);

  const hud=document.createElement('div'); hud.id='simHUD';
  hud.style.cssText='position:absolute;left:0;right:0;bottom:0;z-index:8;display:none;background:var(--panel);border-top:1px solid var(--line);padding:8px 12px';
  hud.innerHTML=`
   <div style="display:flex;flex-wrap:wrap;gap:14px;align-items:center">
     <div id="simInputs" style="display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:var(--ink2)">INPUT</span></div>
     <div id="simScens" style="display:flex;gap:6px;align-items:center"><span style="font-size:10px;color:var(--ink2)">SCENARIO</span></div>
     <div style="display:flex;gap:6px;align-items:center">
       <button class="simbtn" id="simDbg">○ Debug</button>
       <button class="simbtn" id="simNext">▶ Next Tick</button>
       <button class="simbtn" id="simRun">⏩ Auto Run</button>
       <button class="simbtn" id="simRst">↺ Reset</button>
     </div>
     <div style="display:flex;gap:11px;align-items:center;font-size:10px;color:var(--ink2)">
       <label>votes <input id="simVotes" type="range" min="1" max="6" value="2" style="width:64px"> <b id="simVotesV" style="color:var(--ink)">2</b></label>
       <label>K <input id="simK" type="range" min="1" max="3" value="1" style="width:46px"> <b id="simKV" style="color:var(--ink)">1</b></label>
       <label>reminder <select id="simRem" style="background:var(--panel2);color:var(--ink);border:1px solid var(--line);border-radius:5px"><option value="180000">180s</option><option value="10000">10s</option></select></label>
       <label>speed <input id="simSpeed" type="range" min="120" max="1100" step="20" value="550" style="width:84px"> <b id="simSpeedV" style="color:var(--ink)">550ms</b></label>
     </div>
   </div>
   <div style="margin-top:6px;display:flex;gap:8px;align-items:baseline">
     <span id="simTickN" style="font-size:10px;color:var(--ink2)">TICK 0</span>
     <span id="simTickL" style="font-size:11.5px;font-weight:600;color:#94a3b8">idle — pick INPUT / SCENARIO or step Next Tick</span>
   </div>
   <div id="simLog" style="margin-top:4px;height:72px;overflow-y:auto;background:rgba(0,0,0,.3);border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-family:ui-monospace,monospace;font-size:10px;line-height:1.5"></div>`;
  stage.appendChild(hud);

  const $=s=>hud.querySelector(s);
  const hudTickN=$('#simTickN'), hudTickL=$('#simTickL'), hudLog=$('#simLog');
  const hudRun=$('#simRun'), hudK=$('#simK'), hudKV=$('#simKV');
  // input buttons
  SIM_SIGNS.forEach(sg=>{ const b=document.createElement('button'); b.className='simbtn';
    b.style.borderColor='#2c6a8f'; b.style.color='#9bd2f0'; b.textContent=sg.replace('sign_','');
    b.onclick=()=>simEnqueue(sg); $('#simInputs').appendChild(b); });
  (function(){ const b=document.createElement('button'); b.className='simbtn'; b.textContent='NULL';
    b.onclick=()=>simEnqueue(null); $('#simInputs').appendChild(b); })();
  // scenario buttons
  Object.keys(SIM_SCEN).forEach(k=>{ const b=document.createElement('button'); b.className='simbtn';
    b.style.borderColor='#7c5cc4'; b.style.color='#cdbbf2'; b.textContent=k;
    b.title=({A:'Normal detection 80×3',B:'YOLO flicker (no re-arm)',C:'Gapless 50→60',D:'Repeat same → SUPPRESS',E:'Reminder after 180s',F:'False CLS, K=2 rejects'})[k];
    b.onclick=()=>simRunScenario(k); $('#simScens').appendChild(b); });
  // controls
  $('#simDbg').onclick=function(){ simDebug=!simDebug; this.classList.toggle('on',simDebug);
    this.textContent=simDebug?'● DEBUG':'○ Debug'; simStop(); };
  $('#simNext').onclick=()=>simStep();
  hudRun.onclick=()=>{ if(simTimer) simStop(); else simAutorun(); };
  $('#simRst').onclick=()=>simReset();
  $('#simVotes').oninput=function(){ simState.config.requiredVotes=+this.value; simState.voter.required=+this.value; $('#simVotesV').textContent=this.value; simRender(); };
  hudK.oninput=function(){ simState.config.K=+this.value; hudKV.textContent=this.value; simRender(); };
  $('#simRem').onchange=function(){ simState.config.reminderMs=+this.value; simRender(); };
  $('#simSpeed').oninput=function(){ simState.config.speed=+this.value; $('#simSpeedV').textContent=this.value+'ms'; };

  /* ---------- "why" popup (Req 7) ---------- */
  const WHY={
    camera:{t:'Camera',p:['Captures frames from the Pi camera (Picamera2, embedded CPython).','Converts RGB888 → BGR for OpenCV/NCNN.'],w:['No image source — nothing to detect.'],y:['read() crosses C++↔Python, so the GIL must be Ensure/Release-bracketed or the interpreter corrupts.'],th:'ต้นทางภาพ — อ่านเฟรมจากกล้องแล้วแปลงสี'},
    cameraThread:{t:'CameraThread',p:['Optional capture thread (--async-camera) so capture never blocks decisions.','Owns the double buffer.'],w:['Capture runs inline → stalls perception.'],y:['Decouples the camera clock from the inference clock.'],th:'เธรดกล้อง — แยกการอ่านภาพออกจาก loop หลัก'},
    doubleBuffer:{t:'Double Buffer',p:['Two slots: one written by camera, one read by consumer (a clone).','Per-slot mutex + atomic ready-index.'],w:['Camera writes while YOLO reads the SAME cv::Mat → torn frame / corruption / race.'],y:['Producer and consumer never touch the same memory at once. Clone ≈ 0.1 ms.'],th:'บัฟเฟอร์คู่ — แยกหน่วยความจำเขียน(กล้อง)กับอ่าน(YOLO) กัน race condition'},
    asyncWorker:{t:'AsyncDetectionWorker',p:['Runs YOLO off-main; single pending/result slot; latest-wins; counts dropped frames.'],w:['YOLO (~93 ms) blocks the loop every frame → FPS collapses.'],y:['YOLO is slower than capture. Latest-wins drops stale frames → FRESHNESS over completeness; a backlog makes the speaker announce the past.'],th:'เวิร์กเกอร์ — รัน YOLO แยกเธรด ใช้ latest-wins ทิ้งเฟรมเก่า เอาความสด'},
    yolo:{t:'YOLO Detector',p:['Detects "is there a speed sign, and where" → presence + bounding box.','letterbox → ncnn → NMS.'],w:['No localisation; nothing to vote on or classify.'],y:['Authority split: YOLO owns PRESENCE + ROI, NOT the value. Its sub-class is unstable — the number is decided by CLS.'],th:'ตรวจจับป้าย — บอกว่ามีป้ายไหม+ตรงไหน (ไม่ฟันธงตัวเลข)'},
    voter:{t:'TemporalVoter',p:['Accumulates detections over a window; CONFIRMS only when a class hits the vote threshold.'],w:['Every noisy YOLO frame would fire the pipeline → flicker = false events.'],y:['Temporal filtering: one frame is not a decision. Production uses 4-of-10; this sim defaults lower so short demos confirm — adjust "votes".'],th:'ตัวโหวตตามเวลา — สะสมหลายเฟรมแล้วค่อยยืนยัน กันการสั่น'},
    roi:{t:'ROI Selection',p:['Keeps the highest-confidence crop per class during a voting window; cleared on confirm.'],w:['Classifier runs on a blurry/partial frame → worse accuracy.'],y:['Confirm-then-Classify: classify ONCE, on the best crop, at the confirm event.'],th:'เลือก ROI — เก็บ crop ที่ชัดสุดในรอบโหวต'},
    cls:{t:'CLS Model',p:['Classifies the actual number (50/60/80/90/100). Runs only at a confirm event.'],w:['You would trust the unstable YOLO sub-class → wrong speed under flicker.'],y:['CLS is the VALUE AUTHORITY. Separating presence (YOLO) from value (CLS) is the core redesign.'],th:'โมเดลจำแนกค่า — ฟันธงตัวเลขบนป้าย เป็นเจ้าของค่า'},
    legacy:{t:'Legacy Pipeline (removed)',p:['Old path: voter + CooldownManager printing "[CONFIRMED]" (console, no audio). REMOVED at the cutover on 2026-06-17.'],w:['Episode identity was tied to the unstable YOLO sub-class → flicker became a false value-change.'],y:['Superseded by L1–L4, which became the authority at cutover; L3 now owns anti-spam.'],th:'ไปป์ไลน์เดิม — ถูกถอดออกตอน cutover 06-17; L1–L4 เป็นตัวตัดสินแทน'},
    l1:{t:'L1 SignEpisodeLifecycle',p:['Tracks one sighting episode: ARMED → CONFIRMED → RELEASING → re-arm.','fresh=TRUE only on Armed→Confirmed (a NEW sighting after a gap).'],w:['Cannot tell a continuous sign from a re-encounter → spurious repeats or missed reminders.'],y:['VALUE-BLIND. reset() must NEVER be wired to presence loss (would break L2 no-forget). rearm_after default 600 ms.'],th:'วงจรชีวิตการเห็นป้าย — แยกเห็นต่อเนื่องกับเห็นใหม่ (fresh)'},
    l2:{t:'L2 CurrentSpeedLimitManager',p:['Holds the persistent BELIEF of the speed limit (UNKNOWN/ACTIVE).','Acquire commits immediately; a DIFFERENT value needs K confirms; same value refreshes & clears pending.'],w:['A momentary occlusion or one bad CLS frame would wipe/flip the limit.'],y:['NO-FORGET: presence loss never changes the value. K-hysteresis rejects unstable CLS flips. age() is telemetry only.'],th:'ความเชื่อค่าจำกัดความเร็ว — no-forget + K-hysteresis กันค่าสั่น'},
    l3:{t:'L3 AnnouncementPolicy',p:['Decides what to SAY: CHANGE (always), REMINDER (fresh re-encounter, gated by cooldown), or SUPPRESS.'],w:['Either constant nagging or missing real changes.'],y:['Anti-spam lives HERE, not in perception. CHANGE bypasses but resets the cooldown; REMINDER also resets it. Default 180 s.'],th:'นโยบายประกาศ — ตัดสินว่าจะพูด CHANGE/REMINDER หรือเงียบ'},
    l4:{t:'L4 NotificationManager',p:['Maps (action,value) → wav and plays on a dedicated audio thread. Single slot, latest-wins; play outside the lock.'],w:['Synchronous play blocks perception; a FIFO queue plays STALE state.'],y:['Latest-wins: a burst collapses to first+last; the speaker never lies. aplay via posix_spawn — preemptible (kill-aplay) so safety can interrupt.'],th:'ตัวจัดการเสียง — เล่น wav เธรดแยก เก็บค่าล่าสุด ไม่บล็อกการมองเห็น; ตัดกลางคันได้ (kill-aplay)'},
    speaker:{t:'Speaker',p:['MAX98357A I2S amp + 3 W speaker. Speaks the Thai voice clip.'],w:['No audible notification.'],y:['Final non-authoritative output of the SHADOW path (--shadow --audio). Legacy console authority untouched.'],th:'ลำโพง — เอาต์พุตเสียงจริงของฝั่ง shadow'},
  };
  const why=document.createElement('div'); why.id='simWhy';
  why.style.cssText='position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;background:rgba(3,6,10,.72)';
  why.innerHTML=`<div id="simWhyCard" style="background:var(--panel);border:1px solid var(--line);border-left:5px solid var(--accent);border-radius:14px;max-width:560px;width:92%;padding:20px;font-family:Inter,system-ui,sans-serif"></div>`;
  document.body.appendChild(why);
  why.addEventListener('click',e=>{ if(e.target===why) why.style.display='none'; });
  function openWhy(id){ const d=WHY[id]; if(!d)return;
    const sec=(t,arr,c)=>arr?`<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:700;letter-spacing:.4px;color:${c};margin-bottom:4px">${t}</div>`+
      arr.map(l=>`<div style="font-size:12.5px;color:#cbd5e1;line-height:1.6">• ${esc(l)}</div>`).join('')+`</div>`:'';
    why.querySelector('#simWhyCard').innerHTML=
      `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
         <h2 style="margin:0;font-size:16px;color:var(--accent)">${esc(d.t)}</h2>
         <button class="simbtn" id="simWhyX">✕</button></div>`+
      sec('PURPOSE',d.p,'#86efac')+sec('WITHOUT THIS BLOCK',d.w,'#fca5a5')+sec('WHY IT IS DESIGNED THIS WAY',d.y,'#93c5fd')+
      `<div style="margin-top:6px;padding-top:10px;border-top:1px solid var(--line);font-size:12.5px;color:#fcd9a8">🇹🇭 ${esc(d.th)}</div>`;
    why.querySelector('#simWhyX').onclick=()=>why.style.display='none';
    why.style.display='flex';
  }
  // node click → popup (movement-guarded so panning/selecting still works)
  (function(){ const svg=DOMB['b10'].svg; let dx=0,dy=0,moved=false;
    svg.addEventListener('pointerdown',e=>{dx=e.clientX;dy=e.clientY;moved=false;});
    svg.addEventListener('pointermove',e=>{ if(Math.abs(e.clientX-dx)+Math.abs(e.clientY-dy)>6) moved=true; });
    svg.addEventListener('click',e=>{ if(moved)return; const g=e.target.closest&&e.target.closest('.node'); if(g) openWhy(g.dataset.id); });
  })();

  // show/hide HUD + lazy init when Board 10 is opened
  window.__simOnShow=function(id){
    if(id==='b10'){ hud.style.display='block'; if(!simInit){ simInit=true; simReset(); } else simRender(); }
    else { hud.style.display='none'; simStop(); }
  };
})();

// start
showBoard('b0');
</script>
</body>
</html>
